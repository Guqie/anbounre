<svg width="800" height="550" viewBox="0 0 800 550" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义样式 -->
  <style>
    .main-title { fill: black; font-family: "Microsoft YaHei", sans-serif; font-size: 20px; font-weight: bold; text-anchor: middle; }
    .title-box { fill: #C0392B; stroke: none; }
    .title-text { fill: white; font-family: "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
    .table-text { fill: #333; font-family: "Microsoft YaHei", sans-serif; font-size: 12px; }
    .header-text { fill: #C0392B; font-family: "Microsoft YaHei", sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
    .cell-border { fill: none; stroke: #333; stroke-width: 1; }
    .icon-fill { fill: #555; }
  </style>

  <!-- 0. 总标题 -->
  <text x="400" y="30" class="main-title">图14 三种主流飞行器的特点比较</text>

  <!-- 将原内容整体下移 50 像素 -->
  <g transform="translate(0, 50)">
      <!-- 1. 顶部标题栏 (箭头形状) -->
      <!-- 无人机 -->
      <path d="M150,20 L350,20 L350,60 L250,80 L150,60 Z" class="title-box" transform="translate(-50, 0)"/>
      <text x="200" y="50" class="title-text">无人机</text>
    
      <!-- eVTOL -->
      <path d="M150,20 L350,20 L350,60 L250,80 L150,60 Z" class="title-box" transform="translate(150, 0)"/>
      <text x="400" y="50" class="title-text">eVTOL</text>
    
      <!-- 直升机 -->
      <path d="M150,20 L350,20 L350,60 L250,80 L150,60 Z" class="title-box" transform="translate(350, 0)"/>
      <text x="600" y="50" class="title-text">直升机</text>
    
      <!-- 2. 图标占位 (简易矢量图) -->
      <!-- 无人机图标 -->
      <g transform="translate(170, 90) scale(0.6)">
        <circle cx="50" cy="50" r="10" class="icon-fill"/>
        <rect x="20" y="45" width="60" height="10" class="icon-fill"/>
        <rect x="45" y="20" width="10" height="60" class="icon-fill"/>
        <circle cx="20" cy="20" r="8" fill="none" stroke="#555" stroke-width="2"/>
        <circle cx="80" cy="20" r="8" fill="none" stroke="#555" stroke-width="2"/>
        <circle cx="20" cy="80" r="8" fill="none" stroke="#555" stroke-width="2"/>
        <circle cx="80" cy="80" r="8" fill="none" stroke="#555" stroke-width="2"/>
      </g>
    
      <!-- eVTOL图标 -->
      <g transform="translate(370, 90) scale(0.6)">
        <ellipse cx="50" cy="50" rx="30" ry="15" class="icon-fill" fill-opacity="0.8"/>
        <line x1="10" y1="30" x2="90" y2="30" stroke="#555" stroke-width="3"/>
        <line x1="10" y1="70" x2="90" y2="70" stroke="#555" stroke-width="3"/>
        <circle cx="10" cy="30" r="5" class="icon-fill"/>
        <circle cx="90" cy="30" r="5" class="icon-fill"/>
        <circle cx="10" cy="70" r="5" class="icon-fill"/>
        <circle cx="90" cy="70" r="5" class="icon-fill"/>
      </g>
    
      <!-- 直升机图标 -->
      <g transform="translate(570, 85) scale(0.6)">
        <ellipse cx="50" cy="60" rx="25" ry="15" class="icon-fill"/>
        <rect x="55" y="55" width="40" height="5" class="icon-fill"/>
        <circle cx="95" cy="57" r="8" fill="none" stroke="#555" stroke-width="2"/>
        <line x1="50" y1="60" x2="50" y2="30" stroke="#555" stroke-width="3"/>
        <line x1="20" y1="30" x2="80" y2="30" stroke="#555" stroke-width="3"/>
      </g>
    
      <!-- 3. 表格区域 -->
      <g transform="translate(20, 150)">
        
        <!-- 背景色填充 -->
        <!-- Col 1 (无人机) -->
        <rect x="80" y="0" width="220" height="260" fill="#E8F5E9" opacity="0.5"/>
        <!-- Col 2 (eVTOL) -->
        <rect x="300" y="0" width="220" height="260" fill="#FDEBD0" opacity="0.5"/>
        <!-- Col 3 (直升机) -->
        <rect x="520" y="0" width="220" height="260" fill="#FADBD8" opacity="0.5"/>
    
        <!-- 表格线 -->
        <rect x="0" y="0" width="740" height="260" class="cell-border"/>
        
        <!-- 横线 -->
        <line x1="0" y1="40" x2="740" y2="40" stroke="#333" stroke-width="1"/>
        <line x1="0" y1="80" x2="740" y2="80" stroke="#333" stroke-width="1"/>
        <line x1="0" y1="120" x2="740" y2="120" stroke="#333" stroke-width="1"/>
        <line x1="0" y1="160" x2="740" y2="160" stroke="#333" stroke-width="1"/>
    
        <!-- 竖线 -->
        <line x1="80" y1="0" x2="80" y2="260" stroke="#333" stroke-width="1"/>
        <line x1="300" y1="0" x2="300" y2="260" stroke="#333" stroke-width="1"/>
        <line x1="520" y1="0" x2="520" y2="260" stroke="#333" stroke-width="1"/>
    
        <!-- 文本内容 -->
        <!-- Row 1: 优势 -->
        <text x="40" y="25" class="header-text">优势</text>
        <text x="90" y="25" class="table-text">灵活性高、成本低、易于部署</text>
        <text x="310" y="25" class="table-text">垂直起降、电动化、高效出行</text>
        <text x="530" y="25" class="table-text">垂直起降、速度快、载重能力强</text>
    
        <!-- Row 2: 劣势 -->
        <text x="40" y="65" class="header-text">劣势</text>
        <text x="90" y="65" class="table-text">续航能力、载重能力有限</text>
        <text x="310" y="65" class="table-text">技术挑战、法规限制</text>
        <text x="530" y="65" class="table-text">高成本、噪音大、高污染</text>
    
        <!-- Row 3: 应用场景 -->
        <text x="40" y="105" class="header-text">应用场景</text>
        <text x="90" y="105" class="table-text">航拍、农林植保、环境监测保护等</text>
        <text x="310" y="105" class="table-text">城市空中交通、应急救援等</text>
        <text x="530" y="105" class="table-text">长途运输、应急救援等</text>
    
        <!-- Row 4: 产业现状 -->
        <text x="40" y="145" class="header-text">产业现状</text>
        <text x="90" y="145" class="table-text">技术不断成熟、法规逐步完善</text>
        <text x="310" y="145" class="table-text">多家企业布局、试点项目推进</text>
        <text x="530" y="145" class="table-text">技术成熟稳定、市场竞争加剧</text>
    
        <!-- Row 5: 发展趋势 (多行文本) -->
        <text x="40" y="210" class="header-text">发展趋势</text>
        
        <!-- 无人机趋势 -->
        <text x="90" y="185" class="table-text">➢ 技术持续创新，成本降低，</text>
        <text x="105" y="200" class="table-text">应用广泛。</text>
        <text x="90" y="220" class="table-text">➢ 未来与其他低空飞行器协同，</text>
        <text x="105" y="235" class="table-text">提升整体效率。</text>
    
        <!-- eVTOL趋势 -->
        <text x="310" y="185" class="table-text">➢ 将成为未来城市出行的重要方式。</text>
        <text x="310" y="215" class="table-text">➢ 垂直起降、电驱动环保，是低空</text>
        <text x="325" y="230" class="table-text">经济的新热点。</text>
    
        <!-- 直升机趋势 -->
        <text x="530" y="185" class="table-text">➢ 在特定领域和任务中仍具独特</text>
        <text x="545" y="200" class="table-text">优势。</text>
        <text x="530" y="220" class="table-text">➢ 向智能化、环保化发展。</text>
      </g>
    
      <!-- 底部来源 -->
      <text x="760" y="430" class="table-text" text-anchor="end" font-style="italic" fill="#666">来源：中国信息通信研究院，安邦智库整理</text>
  </g>
</svg>