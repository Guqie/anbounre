<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Microsoft YaHei', sans-serif;">
  <!-- Background -->
  <rect width="1280" height="720" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="640" y="50" font-size="32" font-weight="bold" fill="#2c3e50" text-anchor="middle">算力产业链全景图 (Computing Power Industry Chain)</text>
  <line x1="100" y1="70" x2="1180" y2="70" stroke="#3498db" stroke-width="3"/>

  <!-- Legend -->
  <g transform="translate(1000, 30)">
    <rect x="0" y="0" width="20" height="20" fill="#e8f6fd" stroke="#3498db"/>
    <text x="30" y="15" font-size="14" fill="#333">基础层</text>
    <rect x="100" y="0" width="20" height="20" fill="#fef6e7" stroke="#f39c12"/>
    <text x="130" y="15" font-size="14" fill="#333">核心层</text>
  </g>

  <!-- ================= UPSTREAM (上游：算力基础设施与核心硬件) ================= -->
  <g transform="translate(50, 100)">
    <!-- Header -->
    <rect x="0" y="0" width="300" height="40" fill="#3498db" rx="5"/>
    <text x="150" y="28" fill="white" font-size="18" font-weight="bold" text-anchor="middle">上游：算力基础设施与硬件</text>
    
    <!-- Container -->
    <rect x="0" y="50" width="300" height="520" fill="#e8f6fd" stroke="#3498db" stroke-width="2" rx="10"/>
    
    <!-- Chipset -->
    <g transform="translate(20, 70)">
      <rect width="260" height="100" fill="white" stroke="#bdc3c7" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">核心芯片 (Chips)</text>
      <line x1="20" y1="35" x2="240" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• GPU/AI芯片: 英伟达, 华为昇腾, 寒武纪</text>
      <text x="30" y="80" font-size="12" fill="#666">• CPU: Intel, AMD, 海光信息</text>
    </g>

    <!-- Components -->
    <g transform="translate(20, 190)">
      <rect width="260" height="120" fill="white" stroke="#bdc3c7" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">关键零部件 (Components)</text>
      <line x1="20" y1="35" x2="240" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• 存储: 三星, SK海力士, 长鑫存储</text>
      <text x="30" y="80" font-size="12" fill="#666">• 光模块: 中际旭创, 新易盛</text>
      <text x="30" y="100" font-size="12" fill="#666">• 散热/液冷: 英维克, 曙光数创</text>
    </g>

    <!-- Equipment -->
    <g transform="translate(20, 330)">
      <rect width="260" height="100" fill="white" stroke="#bdc3c7" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">整机设备 (Equipment)</text>
      <line x1="20" y1="35" x2="240" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• AI服务器: 浪潮, 中科曙光, 新华三</text>
      <text x="30" y="80" font-size="12" fill="#666">• 交换机: 华为, 锐捷网络</text>
    </g>

    <!-- Network -->
    <g transform="translate(20, 450)">
      <rect width="260" height="100" fill="white" stroke="#bdc3c7" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#2c3e50" text-anchor="middle">网络通信 (Network)</text>
      <line x1="20" y1="35" x2="240" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• 运营商: 移动, 电信, 联通</text>
      <text x="30" y="80" font-size="12" fill="#666">• 光纤光缆: 长飞光纤, 亨通光电</text>
    </g>
  </g>

  <!-- Arrow -->
  <polygon points="360,360 400,360 400,350 440,370 400,390 400,380 360,380" fill="#95a5a6"/>

  <!-- ================= MIDSTREAM (中游：算力服务与平台) ================= -->
  <g transform="translate(450, 100)">
    <!-- Header -->
    <rect x="0" y="0" width="380" height="40" fill="#f39c12" rx="5"/>
    <text x="190" y="28" fill="white" font-size="18" font-weight="bold" text-anchor="middle">中游：算力服务与调度平台</text>
    
    <!-- Container -->
    <rect x="0" y="50" width="380" height="520" fill="#fef6e7" stroke="#f39c12" stroke-width="2" rx="10"/>
    
    <!-- Computing Center -->
    <g transform="translate(20, 70)">
      <rect width="340" height="120" fill="white" stroke="#f5cba7" rx="5"/>
      <text x="170" y="25" font-size="16" font-weight="bold" fill="#d35400" text-anchor="middle">算力中心 (IDC/AIDC)</text>
      <line x1="20" y1="35" x2="320" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• 智算中心: 商汤AIDC, 百度智能云</text>
      <text x="30" y="80" font-size="12" fill="#666">• 超算中心: 国家超级计算中心</text>
      <text x="30" y="100" font-size="12" fill="#666">• 数据中心: 万国数据, 润泽科技, 宝信软件</text>
    </g>

    <!-- Cloud Service -->
    <g transform="translate(20, 210)">
      <rect width="340" height="120" fill="white" stroke="#f5cba7" rx="5"/>
      <text x="170" y="25" font-size="16" font-weight="bold" fill="#d35400" text-anchor="middle">云服务 (Cloud Service)</text>
      <line x1="20" y1="35" x2="320" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• IaaS: 阿里云, 腾讯云, 华为云</text>
      <text x="30" y="80" font-size="12" fill="#666">• PaaS: 百度飞桨, 旷视科技</text>
      <text x="30" y="100" font-size="12" fill="#666">• 算力租赁: 鸿博股份, 中贝通信</text>
    </g>

    <!-- Scheduling Platform -->
    <g transform="translate(20, 350)">
      <rect width="340" height="100" fill="white" stroke="#f5cba7" rx="5"/>
      <text x="170" y="25" font-size="16" font-weight="bold" fill="#d35400" text-anchor="middle">算力调度与交易 (Scheduling)</text>
      <line x1="20" y1="35" x2="320" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• 算力网: 中国算力网, 东数西算节点</text>
      <text x="30" y="80" font-size="12" fill="#666">• 交易平台: 贵阳大数据交易所, 深圳数据交易所</text>
    </g>
    
    <!-- Model Service -->
    <g transform="translate(20, 470)">
      <rect width="340" height="80" fill="white" stroke="#f5cba7" rx="5"/>
      <text x="170" y="25" font-size="16" font-weight="bold" fill="#d35400" text-anchor="middle">模型服务 (MaaS)</text>
      <line x1="20" y1="35" x2="320" y2="35" stroke="#eee"/>
      <text x="30" y="60" font-size="12" fill="#666">• 大模型: 文心一言, 通义千问, DeepSeek</text>
    </g>
  </g>

  <!-- Arrow -->
  <polygon points="840,360 880,360 880,350 920,370 880,390 880,380 840,380" fill="#95a5a6"/>

  <!-- ================= DOWNSTREAM (下游：行业应用) ================= -->
  <g transform="translate(930, 100)">
    <!-- Header -->
    <rect x="0" y="0" width="300" height="40" fill="#2ecc71" rx="5"/>
    <text x="150" y="28" fill="white" font-size="18" font-weight="bold" text-anchor="middle">下游：行业应用与场景</text>
    
    <!-- Container -->
    <rect x="0" y="50" width="300" height="520" fill="#eafaf1" stroke="#2ecc71" stroke-width="2" rx="10"/>
    
    <!-- Internet -->
    <g transform="translate(20, 70)">
      <rect width="260" height="80" fill="white" stroke="#a9dfbf" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#27ae60" text-anchor="middle">互联网 & AIGC</text>
      <text x="30" y="55" font-size="12" fill="#666">• 搜索引擎, 社交网络, 内容生成</text>
    </g>

    <!-- Industry -->
    <g transform="translate(20, 170)">
      <rect width="260" height="80" fill="white" stroke="#a9dfbf" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#27ae60" text-anchor="middle">智慧工业</text>
      <text x="30" y="55" font-size="12" fill="#666">• 工业质检, 预测性维护, 数字孪生</text>
    </g>

    <!-- Finance -->
    <g transform="translate(20, 270)">
      <rect width="260" height="80" fill="white" stroke="#a9dfbf" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#27ae60" text-anchor="middle">智慧金融</text>
      <text x="30" y="55" font-size="12" fill="#666">• 量化交易, 风控反欺诈, 智能客服</text>
    </g>

    <!-- City & Transport -->
    <g transform="translate(20, 370)">
      <rect width="260" height="80" fill="white" stroke="#a9dfbf" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#27ae60" text-anchor="middle">智慧城市 & 交通</text>
      <text x="30" y="55" font-size="12" fill="#666">• 自动驾驶, 城市大脑, 视频安防</text>
    </g>

    <!-- Science -->
    <g transform="translate(20, 470)">
      <rect width="260" height="80" fill="white" stroke="#a9dfbf" rx="5"/>
      <text x="130" y="25" font-size="16" font-weight="bold" fill="#27ae60" text-anchor="middle">科学计算</text>
      <text x="30" y="55" font-size="12" fill="#666">• 新药研发, 气象预测, 基因测序</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="640" y="680" font-size="14" fill="#7f8c8d" text-anchor="middle">数据来源：沙利文2025年中国AI基础设施报告、中国信通院 | 绘制：旺庄街道算力产业招商专班</text>
</svg>
