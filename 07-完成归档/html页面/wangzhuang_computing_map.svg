<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" style="background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif;">
  <!-- Title Bar -->
  <rect x="0" y="0" width="1920" height="80" fill="#1a3b5c"/>
  <text x="960" y="55" fill="white" font-size="36" text-anchor="middle" font-weight="bold">旺庄街道·算力产业招商图谱 (2025版)</text>
  
  <!-- Main Layout Grid: 3 Columns (Left: Industry, Center: Wangzhuang, Right: Ecosystem) -->
  
  <!-- ================= LEFT COLUMN: 产业全景 (Industry Panorama) ================= -->
  <g transform="translate(40, 100)">
    <!-- Section 1: 发展概况 -->
    <rect x="0" y="0" width="580" height="300" fill="white" rx="10" stroke="#e0e0e0"/>
    <rect x="0" y="0" width="580" height="40" fill="#eef2f6" rx="10" clip-path="url(#clip-top)"/>
    <text x="20" y="30" font-size="20" fill="#333" font-weight="bold">1. 算力产业发展概况</text>
    
    <!-- Chart Placeholder -->
    <text x="30" y="80" font-size="14" fill="#666">中国AI基础设施市场投资规模 (亿元)</text>
    <line x1="50" y1="250" x2="550" y2="250" stroke="#ccc" stroke-width="2"/>
    <!-- Bar 2023 -->
    <rect x="80" y="180" width="60" height="70" fill="#88c1ff"/>
    <text x="110" y="175" font-size="12" text-anchor="middle">1054</text>
    <text x="110" y="270" font-size="12" text-anchor="middle">2023</text>
    <!-- Bar 2024 -->
    <rect x="200" y="140" width="60" height="110" fill="#409eff"/>
    <text x="230" y="135" font-size="12" text-anchor="middle">1696</text>
    <text x="230" y="270" font-size="12" text-anchor="middle">2024</text>
    <!-- Bar 2025E -->
    <rect x="320" y="80" width="60" height="170" fill="#1a3b5c"/>
    <text x="350" y="75" font-size="12" text-anchor="middle">2750</text>
    <text x="350" y="270" font-size="12" text-anchor="middle">2025E</text>
    
    <!-- Key Insight -->
    <text x="420" y="120" font-size="14" fill="#d9534f" font-weight="bold">CAGR > 40%</text>
    <text x="420" y="150" font-size="12" fill="#666">智算占比超30%</text>
    <text x="420" y="170" font-size="12" fill="#666">推理需求爆发</text>

    <!-- Section 2: 产业链结构 -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="580" height="640" fill="white" rx="10" stroke="#e0e0e0"/>
      <rect x="0" y="0" width="580" height="40" fill="#eef2f6" rx="10" clip-path="url(#clip-top)"/>
      <text x="20" y="30" font-size="20" fill="#333" font-weight="bold">2. 算力产业链全景</text>
      
      <!-- Upstream -->
      <g transform="translate(20, 60)">
        <rect x="0" y="0" width="540" height="160" fill="#f0f9eb" stroke="#b3e19d" rx="5"/>
        <text x="20" y="30" font-size="16" fill="#67c23a" font-weight="bold">上游：核心硬件与配套 (招商重点)</text>
        
        <!-- Chips -->
        <rect x="20" y="50" width="110" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="75" y="75" text-anchor="middle" font-size="14" font-weight="bold">AI芯片</text>
        <text x="75" y="95" text-anchor="middle" font-size="10" fill="#666">华为昇腾</text>
        <text x="75" y="110" text-anchor="middle" font-size="10" fill="#666">寒武纪</text>
        <text x="75" y="125" text-anchor="middle" font-size="10" fill="#666">海光信息</text>
        
        <!-- Cooling -->
        <rect x="150" y="50" width="110" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="205" y="75" text-anchor="middle" font-size="14" font-weight="bold">液冷温控</text>
        <text x="205" y="95" text-anchor="middle" font-size="10" fill="#666">英维克</text>
        <text x="205" y="110" text-anchor="middle" font-size="10" fill="#666">曙光数创</text>
        <text x="205" y="125" text-anchor="middle" font-size="10" fill="#666">申菱环境</text>
        
        <!-- Optical -->
        <rect x="280" y="50" width="110" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="335" y="75" text-anchor="middle" font-size="14" font-weight="bold">光模块</text>
        <text x="335" y="95" text-anchor="middle" font-size="10" fill="#666">中际旭创</text>
        <text x="335" y="110" text-anchor="middle" font-size="10" fill="#666">新易盛</text>
        <text x="335" y="125" text-anchor="middle" font-size="10" fill="#666">天孚通信</text>
        
        <!-- PCB/Power -->
        <rect x="410" y="50" width="110" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="465" y="75" text-anchor="middle" font-size="14" font-weight="bold">电源/PCB</text>
        <text x="465" y="95" text-anchor="middle" font-size="10" fill="#666">沪电股份</text>
        <text x="465" y="110" text-anchor="middle" font-size="10" fill="#666">科华数据</text>
        <text x="465" y="125" text-anchor="middle" font-size="10" fill="#666">台达电子</text>
      </g>
      
      <!-- Arrow Down -->
      <polygon points="290,230 280,220 300,220" fill="#999"/>
      
      <!-- Midstream -->
      <g transform="translate(20, 240)">
        <rect x="0" y="0" width="540" height="160" fill="#ecf5ff" stroke="#a0cfff" rx="5"/>
        <text x="20" y="30" font-size="16" fill="#409eff" font-weight="bold">中游：算力中心与服务</text>
        
        <!-- Server OEM -->
        <rect x="20" y="50" width="150" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="95" y="75" text-anchor="middle" font-size="14" font-weight="bold">AI服务器/整机</text>
        <text x="95" y="100" text-anchor="middle" font-size="10" fill="#666">浪潮信息 | 中科曙光</text>
        <text x="95" y="120" text-anchor="middle" font-size="10" fill="#666">工业富联 | 新华三</text>
        
        <!-- Cloud/IDC -->
        <rect x="190" y="50" width="150" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="265" y="75" text-anchor="middle" font-size="14" font-weight="bold">智算中心/云</text>
        <text x="265" y="100" text-anchor="middle" font-size="10" fill="#666">阿里云 | 腾讯云</text>
        <text x="265" y="120" text-anchor="middle" font-size="10" fill="#666">润泽科技 | 万国数据</text>
        
        <!-- Scheduler -->
        <rect x="360" y="50" width="160" height="90" fill="white" stroke="#dcdfe6"/>
        <text x="440" y="75" text-anchor="middle" font-size="14" font-weight="bold">算力调度平台</text>
        <text x="440" y="100" text-anchor="middle" font-size="10" fill="#666">三大运营商</text>
        <text x="440" y="120" text-anchor="middle" font-size="10" fill="#666">地方算力调度中心</text>
      </g>

      <!-- Arrow Down -->
      <polygon points="290,410 280,400 300,400" fill="#999"/>
      
      <!-- Downstream -->
      <g transform="translate(20, 420)">
        <rect x="0" y="0" width="540" height="140" fill="#fdf6ec" stroke="#f3d19e" rx="5"/>
        <text x="20" y="30" font-size="16" fill="#e6a23c" font-weight="bold">下游：应用场景</text>
        <text x="270" y="70" text-anchor="middle" font-size="14">AI大模型训练 · 自动驾驶 · 智慧城市 · 工业质检 · 科学计算</text>
        <text x="270" y="100" text-anchor="middle" font-size="12" fill="#666">蔚小理、商汤、第四范式、科大讯飞...</text>
      </g>
    </g>
  </g>
  
  <!-- ================= CENTER COLUMN: 旺庄机遇 (Wangzhuang Opportunity) ================= -->
  <g transform="translate(640, 100)">
    <!-- Main Map/Core Visual -->
    <rect x="0" y="0" width="640" height="960" fill="white" rx="10" stroke="#e0e0e0"/>
    <rect x="0" y="0" width="640" height="40" fill="#eef2f6" rx="10" clip-path="url(#clip-top)"/>
    <text x="320" y="30" font-size="20" fill="#1a3b5c" font-weight="bold" text-anchor="middle">旺庄街道：精密制造+算力配套核心区</text>
    
    <!-- Central Circle: Wangzhuang -->
    <circle cx="320" cy="300" r="100" fill="#e6f7ff" stroke="#1890ff" stroke-width="3"/>
    <text x="320" y="290" text-anchor="middle" font-size="24" font-weight="bold" fill="#1890ff">旺庄街道</text>
    <text x="320" y="320" text-anchor="middle" font-size="14" fill="#666">无锡高新区核心</text>
    
    <!-- Radiating Lines -->
    <line x1="320" y1="200" x2="320" y2="120" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="220" y1="300" x2="100" y2="300" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="420" y1="300" x2="540" y2="300" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="320" y1="400" x2="320" y2="500" stroke="#ccc" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Advantage 1: Location -->
    <g transform="translate(220, 60)">
      <rect x="0" y="0" width="200" height="60" fill="#f0f9eb" rx="5"/>
      <text x="100" y="25" text-anchor="middle" font-weight="bold" fill="#67c23a">区位交通优势</text>
      <text x="100" y="45" text-anchor="middle" font-size="12" fill="#666">硕放机场10min / 地铁枢纽</text>
    </g>
    
    <!-- Advantage 2: Foundation -->
    <g transform="translate(20, 250)">
      <rect x="0" y="0" width="160" height="100" fill="#ecf5ff" rx="5"/>
      <text x="80" y="30" text-anchor="middle" font-weight="bold" fill="#409eff">现有产业底座</text>
      <text x="80" y="55" text-anchor="middle" font-size="12" fill="#666">奥特维 (光伏/半导体)</text>
      <text x="80" y="75" text-anchor="middle" font-size="12" fill="#666">日联科技 (X射线)</text>
    </g>
    
    <!-- Advantage 3: Policy -->
    <g transform="translate(460, 250)">
      <rect x="0" y="0" width="160" height="100" fill="#fdf6ec" rx="5"/>
      <text x="80" y="30" text-anchor="middle" font-weight="bold" fill="#e6a23c">营商环境</text>
      <text x="80" y="55" text-anchor="middle" font-size="12" fill="#666">国家级孵化器</text>
      <text x="80" y="75" text-anchor="middle" font-size="12" fill="#666">"6+2+X"产业集群</text>
    </g>
    
    <!-- Target List: The "Meat" -->
    <g transform="translate(40, 520)">
      <text x="0" y="0" font-size="20" font-weight="bold" fill="#333">重点招商目标库 (Target List)</text>
      
      <!-- Table Header -->
      <rect x="0" y="20" width="560" height="30" fill="#1a3b5c"/>
      <text x="20" y="40" fill="white" font-weight="bold">细分赛道</text>
      <text x="150" y="40" fill="white" font-weight="bold">招商逻辑 (旺庄切入点)</text>
      <text x="380" y="40" fill="white" font-weight="bold">目标企业 (Top List)</text>
      
      <!-- Row 1: Cooling -->
      <rect x="0" y="50" width="560" height="80" fill="#f5f7fa"/>
      <text x="20" y="80" font-weight="bold" fill="#333">液冷温控</text>
      <text x="20" y="100" font-size="12" fill="#666">(精密加工)</text>
      <text x="150" y="80" font-size="12" width="200">承接液冷板、管路、快接头</text>
      <text x="150" y="100" font-size="12">制造订单，利用现有机械加工能力</text>
      <text x="380" y="80" font-size="12" font-weight="bold" fill="#d9534f">英维克、曙光数创</text>
      <text x="380" y="100" font-size="12" fill="#333">申菱环境、同飞股份</text>
      
      <!-- Row 2: Optical -->
      <rect x="0" y="140" width="560" height="80" fill="white"/>
      <text x="20" y="170" font-weight="bold" fill="#333">高速光模块</text>
      <text x="20" y="190" font-size="12" fill="#666">(电子封装)</text>
      <text x="150" y="170" font-size="12">承接后端封装测试环节</text>
      <text x="150" y="190" font-size="12">对接苏州光通信产业外溢</text>
      <text x="380" y="170" font-size="12" font-weight="bold" fill="#d9534f">中际旭创、新易盛</text>
      <text x="380" y="190" font-size="12" fill="#333">天孚通信、华工科技</text>
      
      <!-- Row 3: Server -->
      <rect x="0" y="230" width="560" height="80" fill="#f5f7fa"/>
      <text x="20" y="260" font-weight="bold" fill="#333">AI服务器</text>
      <text x="20" y="280" font-size="12" fill="#666">(整机组装)</text>
      <text x="150" y="260" font-size="12">结构件配套、SMT贴片</text>
      <text x="150" y="280" font-size="12">信创适配中心落地</text>
      <text x="380" y="260" font-size="12" font-weight="bold" fill="#d9534f">浪潮信息、中科曙光</text>
      <text x="380" y="280" font-size="12" fill="#333">工业富联、神州数码</text>
    </g>
  </g>
  
  <!-- ================= RIGHT COLUMN: 支撑体系 (Support System) ================= -->
  <g transform="translate(1300, 100)">
    <!-- Section 1: 发展趋势 -->
    <rect x="0" y="0" width="580" height="300" fill="white" rx="10" stroke="#e0e0e0"/>
    <rect x="0" y="0" width="580" height="40" fill="#eef2f6" rx="10" clip-path="url(#clip-top)"/>
    <text x="20" y="30" font-size="20" fill="#333" font-weight="bold">3. 产业发展关键趋势</text>
    
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="260" height="100" fill="#fffbe8" stroke="#faecd8" rx="5"/>
      <text x="20" y="30" font-weight="bold" fill="#e6a23c">趋势一：推理算力爆发</text>
      <text x="20" y="55" font-size="12" fill="#666">DeepSeek等大模型应用落地</text>
      <text x="20" y="75" font-size="12" fill="#666">带动边缘计算与推理服务器需求</text>
      
      <rect x="280" y="0" width="260" height="100" fill="#f0f9eb" stroke="#b3e19d" rx="5"/>
      <text x="300" y="30" font-weight="bold" fill="#67c23a">趋势二：液冷成为标配</text>
      <text x="300" y="55" font-size="12" fill="#666">PUE < 1.2 强制标准</text>
      <text x="300" y="75" font-size="12" fill="#666">冷板式/浸没式技术全面渗透</text>
      
      <rect x="0" y="120" width="260" height="100" fill="#f4f4f5" stroke="#e9e9eb" rx="5"/>
      <text x="20" y="150" font-weight="bold" fill="#909399">趋势三：国产化替代</text>
      <text x="20" y="175" font-size="12" fill="#666">信创要求：党政/金融/电信</text>
      <text x="20" y="195" font-size="12" fill="#666">华为昇腾/寒武纪生态扩容</text>
      
      <rect x="280" y="120" width="260" height="100" fill="#ecf5ff" stroke="#b3d8ff" rx="5"/>
      <text x="300" y="150" font-weight="bold" fill="#409eff">趋势四：算力服务化</text>
      <text x="300" y="175" font-size="12" fill="#666">"算力券"发放，降本增效</text>
      <text x="300" y="195" font-size="12" fill="#666">跨区域调度与互联互通</text>
    </g>

    <!-- Section 2: 政策与要素 -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="580" height="640" fill="white" rx="10" stroke="#e0e0e0"/>
      <rect x="0" y="0" width="580" height="40" fill="#eef2f6" rx="10" clip-path="url(#clip-top)"/>
      <text x="20" y="30" font-size="20" fill="#333" font-weight="bold">4. 政策与承载要素</text>
      
      <text x="20" y="80" font-weight="bold" fill="#333">国家级政策支撑：</text>
      <text x="30" y="110" font-size="14" fill="#666">● 《算力基础设施高质量发展行动计划》</text>
      <text x="30" y="140" font-size="14" fill="#666">● “东数西算”工程与全国一体化算力网</text>
      <text x="30" y="170" font-size="14" fill="#666">● 《数据中心绿色低碳发展专项行动计划》</text>
      
      <line x1="20" y1="200" x2="560" y2="200" stroke="#eee"/>
      
      <text x="20" y="240" font-weight="bold" fill="#333">无锡/旺庄承载条件：</text>
      
      <!-- Factor 1 -->
      <g transform="translate(20, 270)">
        <circle cx="20" cy="20" r="20" fill="#409eff"/>
        <text x="14" y="26" fill="white" font-weight="bold">电</text>
        <text x="50" y="20" font-weight="bold">能源保障</text>
        <text x="50" y="40" font-size="12" fill="#666">工业级双回路供电，绿电交易试点</text>
      </g>
      
      <!-- Factor 2 -->
      <g transform="translate(20, 340)">
        <circle cx="20" cy="20" r="20" fill="#67c23a"/>
        <text x="14" y="26" fill="white" font-weight="bold">网</text>
        <text x="50" y="20" font-weight="bold">网络时延</text>
        <text x="50" y="40" font-size="12" fill="#666">长三角核心节点，时延 < 3ms</text>
      </g>
      
      <!-- Factor 3 -->
      <g transform="translate(20, 410)">
        <circle cx="20" cy="20" r="20" fill="#e6a23c"/>
        <text x="14" y="26" fill="white" font-weight="bold">产</text>
        <text x="50" y="20" font-weight="bold">产业配套</text>
        <text x="50" y="40" font-size="12" fill="#666">奥特维等龙头带动，供应链完备</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="#1a3b5c"/>
  <text x="960" y="1065" fill="white" font-size="14" text-anchor="middle">无锡市新吴区旺庄街道办事处 | 2025年算力产业招商专班</text>
</svg>
