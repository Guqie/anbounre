<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="tiny" height="500" version="1.2" width="1000" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fff" height="500" width="1000" x="0" y="0" /><rect fill="#f9f9f9" height="440" rx="10" stroke="#e0e0e0" stroke-width="1" width="455.0" x="30" y="30" /><text fill="#0056b3" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" x="50" y="70">平湖市：三步走打造算力产业发展高地</text><line stroke="#0056b3" stroke-width="2" x1="50" x2="465.0" y1="90" y2="90" /><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="120">“十四五”期间，平湖市紧扣“产业基础高级化、产业链现代化”战略主线，构建“</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="144">传统优势产业升级+新兴产业培育+未来赛道布局”的三维发展格局。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="180">第一步，筑基算力。2020年落地的长三角·平湖润泽国际信息港项目已建成一期</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="204">智算中心，形成4.9万PFLOPS算力规模，支撑阿里云等头部云服务商及智谱</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="228">华章等大模型领军企业的研发需求。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="264">第二步，链式布局。构建“算力硬件-光通信-线缆智造”产业矩阵：依托润泽算力</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="288">中心集聚烽火台、大普微等企业，形成算力服务器/存储器产业集群。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="324">第三步，营优生态。组建“产、研、应1+8+N”人工智能科研创新合作平台，解</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="50" y="348">决算力服务商在产品开发及产业端应用方面遇到的技术难题。</text><rect fill="#f9f9f9" height="440" rx="10" stroke="#e0e0e0" stroke-width="1" width="455.0" x="515.0" y="30" /><text fill="#0056b3" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="20" font-weight="bold" x="535.0" y="70">桐乡市：依托双算力体系助力产业发展</text><line stroke="#0056b3" stroke-width="2" x1="535.0" x2="950.0" y1="90" y2="90" /><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="120">桐乡市依托乌镇互联网大会溢出效应和长三角区位优势构建“乌镇之光”超算中心和</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="144">联通智算中心双核算力体系，打造全国领先的智算产业发展高地。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="180">“大会+产业”双轮驱动招商落地。桐乡市借力乌镇峰会品牌效应，实施“会展招商</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="204">+场景落地”模式。依托“乌镇峰会”的全国影响力，当地构建起“以会聚产、以展</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="228">促商”的精密招商体系。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="264">双算力体系牢筑产业基石。聚焦AI赋能需求，构建“智算+超算”多元协同、数智</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="288">融合的双算力体系。依托算力资源虹吸效应，建设直通乌镇产业园、运河智能汽车文</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="312">化园等数字产业园区。</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="348">示范应用推动成果转化。桐乡市持续打造行业示范应用场景，以场景拓展的需求带动</text><text fill="#444" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="14" x="535.0" y="372">算力产业应用。在智慧交通领域，打造“车路云一体化”试点样板间。</text></svg>