<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="tiny" height="650" version="1.2" width="1000" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#fff" height="650" width="1000" x="0" y="0" /><text fill="#000" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" x="500.0" y="50">国产算力分类</text><rect fill="#ff5722" height="180" width="180" x="50" y="80" /><text fill="#fff" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="140.0" y="178.0">通用算力</text><rect fill="#fff" height="180" stroke="#e0e0e0" stroke-width="1" width="720" x="230" y="80" /><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="126.0">又称基础算力，是以CPU芯片输出的计算能力为主，能够在各种不同的应用场景中提</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="150.0">供广泛、高效、稳定的计算能力，也是目前最常见的算力类型。近年来，随着社会数字</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="174.0">化转型加速、数据处理需求增长，我国数据中心与云计算产业快速发展。在需求端，互</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="198.0">联网行业是通用算力最大需求市场，占比达到39%，其次是电信、政府、服务、金融</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="222.0">、制造、教育、运输。</text><rect fill="#ff5722" height="180" width="180" x="50" y="280" /><text fill="#fff" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="140.0" y="378.0">智能算力</text><rect fill="#fff" height="180" stroke="#e0e0e0" stroke-width="1" width="720" x="230" y="280" /><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="338.0">以GPU、FPGA、AI芯片等加速芯片输出的人工智能计算能力为主，是专门为支</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="362.0">持人工智能算法和应用而设计和优化的计算能力。在需求端，互联网行业的数据处理和</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="386.0">AI模型训练的需求在智能算力占比高达53%，服务行业的智能化升级需求占比第二</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="410.0">，其后是政府、电信、制造、教育、金融、运输。</text><rect fill="#ff5722" height="180" width="180" x="50" y="480" /><text fill="#fff" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="140.0" y="578.0">超算算力</text><rect fill="#fff" height="180" stroke="#e0e0e0" stroke-width="1" width="720" x="230" y="480" /><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="550.0">以超级计算机输出的计算能力为主，通过分布式高性能集群计算系统进行大规模计算任</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="574.0">务，解决科学研究等领域的复杂计算问题。超算是国家综合国力的重要体现，诸多基础</text><text fill="#666" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="16" x="260" y="598.0">科学领域的研究都离不开超算算力的支持。</text></svg>